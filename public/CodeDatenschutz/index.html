  a{color:var(--gold-bright);text-decoration:none}
  a:hover{text-decoration:underline}

  /* Header */
  header{text-align:center;margin-bottom:8px}
  .logos{display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:18px;flex-wrap:wrap}
  .logos img{width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 6px 18px rgba(0,0,0,.45))}
  .logos .amp{font-size:26px;color:var(--low);font-weight:300}

  .subtitle{color:var(--mid);font-size:15px;letter-spacing:.14em;text-transform:uppercase;margin:0}
  .stand{color:var(--low);font-size:13px;margin-top:10px;letter-spacing:.03em}

  .facts{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:26px 0 6px}
  .facts .pill{
    border:1px solid var(--gold-deep);border-radius:999px;padding:7px 15px;font-size:12.5px;

  .langbar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:30px 0 34px}
  .langbar button{
    font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--mid);border-radius:12px;padding:9px 15px;font-size:13.5px;font-weight:600;
    letter-spacing:.06em;transition:all .16s ease;
  }
  .langbar button:hover{border-color:var(--gold-deep);color:var(--hi)}
  .langbar button.active{
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1b1405;border-color:transparent;
    box-shadow:0 6px 18px rgba(212,168,79,.22);
  }

  main{margin-top:6px}
  .lead{
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:20px;padding:22px 24px;margin:0 0 26px;
    color:var(--mid);font-size:15.5px;
  }
  section.doc{
    background:var(--card);border:1px solid var(--line-soft);border-radius:20px;
    padding:6px 26px 10px;margin-bottom:16px;
  }
  section.doc h2{
    font-size:18px;letter-spacing:.02em;margin:22px 0 6px;color:var(--hi);

  }
  section.doc h2 .num{

    border-radius:8px;padding:2px 9px;letter-spacing:.02em;min-width:30px;text-align:center;
  }
  section.doc p{margin:8px 0 18px;color:var(--mid);font-size:15px}
  section.doc p strong{color:var(--hi);font-weight:600}
  section.doc ul{margin:8px 0 18px;padding-left:0;list-style:none}
  section.doc li{position:relative;padding-left:20px;margin:9px 0;color:var(--mid);font-size:15px}
  section.doc li::before{content:"";position:absolute;left:2px;top:.72em;width:7px;height:7px;border-radius:2px;background:var(--gold);transform:rotate(45deg)}

  /* Imprint */
  .imprint{
    border:1px solid var(--gold-deep);border-radius:20px;padding:6px 26px 14px;margin-top:26px;
    background:linear-gradient(180deg,rgba(212,168,79,.06),rgba(212,168,79,.01));
  }

  footer a{color:var(--mid)}
  .lang-block{display:none}

  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  hr.sep{border:none;border-top:1px solid var(--line-soft);margin:34px 0}

const LANGS = ["de","en","fr","es","nl"];

function render(lang){
  const d = T[lang];
  document.documentElement.lang = d.htmlLang;
  document.getElementById("pageTitle").textContent = d.title;
  document.getElementById("pageSub").innerHTML = d.sub;
  document.getElementById("standLine").textContent = d.stand;
  document.title = d.title + " – MenCode & WomenCode";

  document.getElementById("facts").innerHTML =
    d.facts.map(f=>`<span class="pill">${f}</span>`).join("");

  let html = `<div class="lead">${d.lead}</div>`;
  d.sections.forEach(s=>{
    html += `<section class="doc"><h2><span class="num">${s[0]}</span>${s[1]}</h2><p>${s[2]}</p></section>`;
  });
  html += `<hr class="sep"><section class="doc imprint"><h2>${d.imprintTitle}</h2><address>${d.imprint}</address></section>`;
  document.getElementById("content").innerHTML = html;

  document.getElementById("footer").innerHTML =
    `${d.footer}<br><a href="/">praesenzwert.de</a>`;

  document.querySelectorAll(".langbar button").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang===lang);
  });

  try{ localStorage.setItem("codeDatenschutzLang", lang); }catch(e){}
  const url = new URL(window.location);
  url.searchParams.set("lang", lang);
  history.replaceState(null,"",url);
}

function pickInitial(){
  const p = new URLSearchParams(location.search).get("lang");
  if(p && LANGS.includes(p)) return p;
  let stored=null; try{ stored=localStorage.getItem("codeDatenschutzLang"); }catch(e){}
  if(stored && LANGS.includes(stored)) return stored;
  const nav=(navigator.language||"de").slice(0,2).toLowerCase();
  return LANGS.includes(nav)?nav:"de";
}

document.querySelectorAll(".langbar button").forEach(b=>{
  b.addEventListener("click",()=>render(b.dataset.lang));
});
render(pickInitial());
</script>
