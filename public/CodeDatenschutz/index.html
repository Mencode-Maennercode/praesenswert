<style>
  :root{

  a{color:var(--gold-bright);text-decoration:none}
  a:hover{text-decoration:underline}

  /* Header */
  header{text-align:center;margin-bottom:8px}
  .logos{display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:18px;flex-wrap:wrap}
  .logos img{width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 6px 18px rgba(0,0,0,.45))}
  .logos .amp{font-size:26px;color:var(--low);font-weight:300}

    font-size:clamp(28px,6vw,44px);line-height:1.05;margin:.1em 0 .15em;

    background:linear-gradient(180deg,#fff,#cfd4d8);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .subtitle{color:var(--mid);font-size:15px;letter-spacing:.14em;text-transform:uppercase;margin:0}
  .stand{color:var(--low);font-size:13px;margin-top:10px;letter-spacing:.03em}

  .facts{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:26px 0 6px}
  .facts .pill{
    border:1px solid var(--gold-deep);border-radius:999px;padding:7px 15px;font-size:12.5px;
    letter-spacing:.09em;text-transform:uppercase;color:var(--hi);

  .langbar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:30px 0 34px}
  .langbar button{
    font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--mid);border-radius:12px;padding:9px 15px;font-size:13.5px;font-weight:600;
    letter-spacing:.06em;transition:all .16s ease;
  }
  .langbar button:hover{border-color:var(--gold-deep);color:var(--hi)}
  .langbar button.active{
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1b1405;border-color:transparent;
    box-shadow:0 6px 18px rgba(212,168,79,.22);
  }

  /* Sections */
  main{margin-top:6px}
  .lead{
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:20px;padding:22px 24px;margin:0 0 26px;
    color:var(--mid);font-size:15.5px;
  }
  section.doc{
    background:var(--card);border:1px solid var(--line-soft);border-radius:20px;
    padding:6px 26px 10px;margin-bottom:16px;
  }
  section.doc h2{
    font-size:18px;letter-spacing:.02em;margin:22px 0 6px;color:var(--hi);

  }

    border-radius:8px;padding:2px 9px;letter-spacing:.02em;min-width:30px;text-align:center;
  }
  section.doc p{margin:8px 0 18px;color:var(--mid);font-size:15px}
  section.doc p strong{color:var(--hi);font-weight:600}
  section.doc ul{margin:8px 0 18px;padding-left:0;list-style:none}
  section.doc li{position:relative;padding-left:20px;margin:9px 0;color:var(--mid);font-size:15px}
  section.doc li::before{content:"";position:absolute;left:2px;top:.72em;width:7px;height:7px;border-radius:2px;background:var(--gold);transform:rotate(45deg)}

  /* Imprint */
  .imprint{
    border:1px solid var(--gold-deep);border-radius:20px;padding:6px 26px 14px;margin-top:26px;
    background:linear-gradient(180deg,rgba(212,168,79,.06),rgba(212,168,79,.01));
  }
  .imprint address{font-style:normal;color:var(--hi);line-height:1.8;font-size:15px}

  footer{text-align:center;margin-top:40px;color:var(--low);font-size:13px;line-height:1.9}
  footer a{color:var(--mid)}
  .lang-block{display:none}
  .lang-block.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  hr.sep{border:none;border-top:1px solid var(--line-soft);margin:34px 0}

    facts:["Kein Konto","Kein Tracking","Keine Werbung","Offline-first"],
    lead:"Diese Datenschutzerklärung gilt für die Apps <strong>WomenCode</strong> und <strong>MenCode</strong> (nachfolgend „die Apps“). Beide funktionieren nach demselben Grundsatz: ohne Benutzerkonto, ohne Anmeldung, ohne Tracking. Standardmäßig bleiben deine Daten auf deinem Gerät – nur wenn du die freiwilligen Funktionen CoupleCode oder die Konto-Sicherung aktivierst, werden zusätzlich die in Ziffer 4 und 5 beschriebenen Daten verarbeitet.",
    sections:[
      ["1","Verantwortlicher","Dennis Heidenreich<br>Josef-Martin-Weg 4<br>53501 Grafschaft, Deutschland<br>E-Mail: <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>"],
      ["2","Grundsatz: kein Konto, kein Tracking","Die Apps funktionieren ohne Benutzerkonto und ohne Anmeldung. Es gibt <strong>keine Werbung, kein Tracking und keine Analyse-Dienste</strong>. Alle Fortschrittsdaten (Punkte, Level, Serie, Verlauf, Einstellungen) werden standardmäßig ausschließlich <strong>lokal auf deinem Gerät</strong> gespeichert und nicht an uns übertragen.<br><br>Die Apps funktionieren auch vollständig offline. Von Haus aus ist die einzige Online-Funktion der optionale, abschaltbare Wetterabruf (siehe Ziffer 6). Wenn du zusätzlich die ebenfalls freiwilligen und standardmäßig deaktivierten Funktionen CoupleCode (Ziffer 4) oder die Konto-Sicherung über Google (Ziffer 5) aktivierst, werden Daten an Firebase (Google) übertragen. Solange du diese Funktionen nicht nutzt, ändert sich nichts: keine Verbindung zu Google, keine Datenübertragung."],
      ["3","Berechtigungen der Apps","<ul><li><strong>Benachrichtigungen:</strong> für die täglichen Erinnerungen. Diese werden lokal auf dem Gerät geplant – ohne Server.</li><li><strong>Internet:</strong> für den optionalen Wetterabruf (Ziffer 6) und die freiwilligen Unterstützungs-Links (Ziffer 7) sowie – nur wenn du sie aktivierst – für CoupleCode (Ziffer 4) und die Konto-Sicherung (Ziffer 5).</li><li><strong>Zeitzone des Geräts:</strong> wird lokal gelesen, um jahreszeitlich passende Missionen anzuzeigen und den ungefähren Ort für den Wetterabruf zu bestimmen. Ein Zugriff auf den genauen Standort (GPS) findet <strong>nicht</strong> statt.</li></ul>"],
      ["4","CoupleCode: Verbindung mit deinem Partner bzw. deiner Partnerin","CoupleCode ist eine <strong>freiwillige, standardmäßig deaktivierte</strong> Zusatzfunktion, mit der du deine App mit der App deines Partners bzw. deiner Partnerin verbinden kannst. Solange du CoupleCode nicht aktivierst, wird keine Verbindung zu Firebase aufgebaut – es fließen dann keinerlei Daten an Google.<br><br>Auch mit CoupleCode gibt es weiterhin <strong>kein Benutzerkonto und keine Anmeldung</strong>. Die Zuordnung erfolgt über eine anonyme, zufällig erzeugte Kennung (Firebase Anonymous Authentication) – ohne Namen, E-Mail-Adresse oder Telefonnummer.<br><br><ul><li><strong>Auftragsverarbeiter:</strong> Google Ireland Limited (Firebase: Firestore, Authentication, Cloud Messaging). Serverstandort der Datenbank ist die EU (Region eur3, Belgien und Niederlande). Es besteht ein Auftragsverarbeitungsvertrag nach Art. 28 DSGVO über die Firebase-Nutzungsbedingungen.</li><li><strong>Rechtsgrundlage:</strong> deine Einwilligung (Art. 6 Abs. 1 lit. a DSGVO), jederzeit widerrufbar durch Trennen der Verbindung.</li><li><strong>Übertragen werden:</strong> die anonymen Kennungen beider Geräte; Punktestand, Level und Serie als Zahlen; die Nummer der gestrigen Mission aus dem Aufgabenkatalog samt Erledigungsstatus – der Missionstext selbst wird <strong>nicht</strong> übertragen, er liegt in beiden Apps lokal vor; Vermerke wie Einspruch, nachträgliches Abhaken und Erinnerungen; sowie Spitzname und notierte Wunschbelohnung.</li><li><strong>Ende-zu-Ende-Verschlüsselung:</strong> Spitzname und Wunschbelohnung werden auf den Geräten verschlüsselt. Der Schlüssel wird beim Verbinden direkt zwischen den beiden Geräten ausgehandelt (Diffie-Hellman) und niemals übertragen oder gespeichert – weder wir noch Google können diese Inhalte lesen. Der Einladungscode selbst wird nie gespeichert, in der Datenbank liegt nur sein Hashwert. Einladungen laufen nach 72 Stunden ab.</li><li><strong>Push-Benachrichtigungen:</strong> über Firebase Cloud Messaging, wenn dein Partner bzw. deine Partnerin dich erinnert. Dafür wird ein Gerätetoken verarbeitet; die Benachrichtigung selbst enthält keine Inhalte.</li><li><strong>Löschung:</strong> „Verbindung trennen“ löscht den gemeinsamen Datensatz sofort und vollständig bei beiden Geräten.</li></ul>"],
      ["5","Optionale Sicherung über dein Google-Konto","Du kannst dein Google-Konto freiwillig mit der App verknüpfen, damit dein Fortschritt eine Neuinstallation oder einen Gerätewechsel übersteht. Diese Funktion ist standardmäßig deaktiviert.<br><br>Ohne diese Verknüpfung geht dein Fortschritt beim Löschen der App unwiederbringlich verloren – genau dafür ist diese Funktion gedacht.<br><br>Bei der Verknüpfung werden deine E-Mail-Adresse und deine Google-Konto-ID an Firebase Authentication übermittelt. Dein gesicherter Fortschritt liegt unter deiner Nutzerkennung in Firestore (EU). Rechtsgrundlage ist deine Einwilligung (Art. 6 Abs. 1 lit. a DSGVO); du kannst die Verknüpfung jederzeit in den Einstellungen wieder aufheben."],
      ["6","Optionaler Wetterabruf (Open-Meteo)","Damit Missionen zum Tag passen (z. B. keine Draußen-Mission bei Dauerregen), können die Apps aktuelle Wetterdaten abrufen. Dazu wird eine Anfrage an den Wetterdienst <strong>Open-Meteo</strong> (open-meteo.com) gesendet. Technisch übertragen werden dabei deine IP-Adresse sowie eine ungefähre Ortsangabe, die aus der Zeitzone deines Geräts abgeleitet wird (z. B. „Berlin“ bei der Zeitzone Europe/Berlin) – <strong>keine GPS-Koordinaten, kein Bewegungsprofil</strong>.<br><br>Open-Meteo ist ein datenschutzfreundlicher Open-Source-Dienst ohne Konto und ohne Werbe-Tracking. Rechtsgrundlage ist unser berechtigtes Interesse an einer funktionierenden App (Art. 6 Abs. 1 lit. f DSGVO). Ohne Internetverbindung funktioniert die App uneingeschränkt weiter – die Missionen richten sich dann nur nach Datum und Jahreszeit. Du kannst den Wetterabruf jederzeit in den Einstellungen deaktivieren und der Verarbeitung widersprechen (Art. 21 DSGVO)."],
      ["7","Freiwillige Unterstützung (externe Links)","In den Einstellungen kannst du uns freiwillig unterstützen (z. B. über „Buy Me a Coffee“ oder PayPal). Diese Links öffnen sich in deinem Browser. Erst dort gelten die Datenschutzbestimmungen des jeweiligen Anbieters – die App selbst überträgt dabei keine Daten."],
      ["8","App-Stores","Beim Bezug der App über Google Play oder den Apple App Store verarbeiten Google bzw. Apple Daten in eigener Verantwortung (z. B. anonyme Installations-Statistiken nach Land oder Gerätetyp). Details findest du in den Datenschutzerklärungen von Google und Apple."],
      ["9","Löschung deiner Daten","Du hast die volle Kontrolle: „Fortschritt zurücksetzen“ in den Einstellungen löscht alle Fortschrittsdaten. Mit dem Deinstallieren der App werden sämtliche Daten endgültig entfernt.<br><br>Nutzt du CoupleCode, trennt „Verbindung trennen“ die Verknüpfung und löscht den gemeinsamen Datensatz sofort und vollständig bei beiden Geräten (siehe Ziffer 4). Hast du dein Google-Konto zur Sicherung verknüpft (Ziffer 5), kannst du diese Verknüpfung jederzeit in den Einstellungen wieder aufheben.<br><br>Auf unseren eigenen Systemen liegen weiterhin keine Daten von dir. Bei aktivem CoupleCode oder aktiver Konto-Sicherung verarbeitet Firebase (Google) in unserem Auftrag die in Ziffer 4 bzw. 5 genannten Daten."],
      ["10","Deine Rechte","Dir stehen die Rechte aus Art. 15–21 DSGVO zu (Auskunft, Berichtigung, Löschung, Einschränkung, Datenübertragbarkeit, Widerspruch). Solange du CoupleCode und die Konto-Sicherung nicht nutzt, speichern wir keine personenbezogenen Daten von dir – diese Rechte laufen dann in der Regel ins Leere. Nutzt du eine dieser Funktionen, kannst du deine Rechte bezüglich der dort verarbeiteten Daten (siehe Ziffer 4 und 5) jederzeit unter <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a> geltend machen. Du hast zudem das Recht, dich bei einer Datenschutz-Aufsichtsbehörde zu beschweren."]
    ],
    imprintTitle:"Impressum / Anbieter",

  en: {
    htmlLang:"en",
    title:"Privacy Policy",
    sub:"WomenCode & MenCode",
    stand:"Last updated: July 2026",
    facts:["No account","No tracking","No ads","Offline-first"],
    lead:"This privacy policy applies to the apps <strong>WomenCode</strong> and <strong>MenCode</strong> (“the apps”). Both work on the same principle: no user account, no sign-up, no tracking. By default, your data stays on your device – only if you actively turn on the voluntary features CoupleCode or account backup is the data described in sections 4 and 5 additionally processed.",
    sections:[
      ["1","Controller","Dennis Heidenreich<br>Josef-Martin-Weg 4<br>53501 Grafschaft, Germany<br>Email: <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>"],
      ["2","Principle: no account, no tracking","The apps work without a user account and without sign-up. There is <strong>no advertising, no tracking and no analytics</strong>. All progress data (points, levels, streak, history, settings) is stored by default <strong>solely on your device</strong> and is never transmitted to us.<br><br>The apps also work fully offline. Out of the box, the only online feature is the optional weather lookup, which can be switched off (see section 6). If you additionally enable the equally voluntary, off-by-default features CoupleCode (section 4) or the Google account backup (section 5), data is transmitted to Firebase (Google). As long as you don’t use these features, nothing changes: no connection to Google, no data transfer."],
      ["3","App permissions","<ul><li><strong>Notifications:</strong> for the daily reminders. These are scheduled locally on the device – no server involved.</li><li><strong>Internet:</strong> used for the optional weather lookup (section 6) and the voluntary support links (section 7), and – only if you enable them – for CoupleCode (section 4) and the account backup (section 5).</li><li><strong>Device time zone:</strong> read locally to show season-appropriate missions and to determine the approximate location for the weather lookup. Your precise location (GPS) is <strong>never</strong> accessed.</li></ul>"],
      ["4","CoupleCode: connecting with your partner","CoupleCode is a <strong>voluntary, off-by-default</strong> feature that lets you connect your app with your partner’s app. As long as you don’t enable CoupleCode, no connection to Firebase is established – no data is sent to Google.<br><br>Even with CoupleCode there is still <strong>no user account and no sign-up</strong>. Pairing works via an anonymous, randomly generated identifier (Firebase Anonymous Authentication) – without a name, email address or phone number.<br><br><ul><li><strong>Data processor:</strong> Google Ireland Limited (Firebase: Firestore, Authentication, Cloud Messaging). The database is hosted in the EU (region eur3, Belgium and the Netherlands). A data processing agreement under Art. 28 GDPR is in place via Firebase’s terms of service.</li><li><strong>Legal basis:</strong> your consent (Art. 6(1)(a) GDPR), which you can withdraw at any time by disconnecting.</li><li><strong>Data transmitted:</strong> the anonymous identifiers of both devices; points, level and streak as numbers; the number of yesterday’s mission from the mission catalogue plus its completion status – the mission text itself is <strong>not</strong> transmitted, it is stored locally in both apps; notes such as objections, retroactive check-offs and reminders; and the nickname and noted reward wish.</li><li><strong>End-to-end encryption:</strong> the nickname and reward wish are encrypted on the devices. The key is negotiated directly between the two devices when connecting (Diffie-Hellman) and is never transmitted or stored – neither we nor Google can read this content. The invitation code itself is never stored; only its hash value is kept in the database. Invitations expire after 72 hours.</li><li><strong>Push notifications:</strong> sent via Firebase Cloud Messaging when your partner sends you a reminder. This requires processing a device token; the notification itself contains no content.</li><li><strong>Deletion:</strong> “Disconnect” immediately and completely deletes the shared data record on both devices.</li></ul>"],
      ["5","Optional backup via your Google account","You can voluntarily link your Google account to the app so that your progress survives a reinstall or a change of device. This feature is off by default.<br><br>Without linking, your progress is permanently lost when you delete the app – that is exactly the purpose of this feature.<br><br>Linking transmits your email address and Google account ID to Firebase Authentication. Your backed-up progress is stored under your user identifier in Firestore (EU). The legal basis is your consent (Art. 6(1)(a) GDPR); you can undo the link at any time in the settings."],
      ["6","Optional weather lookup (Open-Meteo)","So that missions fit the day (e.g. no outdoor mission during constant rain), the apps can retrieve current weather data. To do this, a request is sent to the weather service <strong>Open-Meteo</strong> (open-meteo.com). This technically transmits your IP address and an approximate location derived from your device’s time zone (e.g. “Berlin” for the Europe/Berlin time zone) – <strong>no GPS coordinates, no movement profile</strong>.<br><br>Open-Meteo is a privacy-friendly open-source service with no account and no advertising trackers. The legal basis is our legitimate interest in a functioning app (Art. 6(1)(f) GDPR). Without an internet connection the app keeps working fully – missions then follow only the date and season. You can disable the weather lookup at any time in the settings and object to the processing (Art. 21 GDPR)."],
      ["7","Voluntary support (external links)","In the settings you can support us voluntarily (e.g. via “Buy Me a Coffee” or PayPal). These links open in your browser. Only there do the privacy terms of the respective provider apply – the app itself transmits no data."],
      ["8","App stores","When you download the app via Google Play or the Apple App Store, Google or Apple process data under their own responsibility (e.g. anonymous install statistics by country or device type). Details can be found in Google’s and Apple’s privacy policies."],
      ["9","Deleting your data","You are in full control: “Reset progress” in the settings deletes all progress data. Uninstalling the app removes all data permanently.<br><br>If you use CoupleCode, “Disconnect” ends the pairing and immediately and completely deletes the shared data record on both devices (see section 4). If you have linked your Google account for backup (section 5), you can undo that link at any time in the settings.<br><br>We still hold no data about you on our own systems. When CoupleCode or the account backup is active, Firebase (Google) processes the data listed in sections 4 and 5 on our behalf."],
      ["10","Your rights","You have the rights under Art. 15–21 GDPR (access, rectification, erasure, restriction, data portability, objection). As long as you don’t use CoupleCode or the account backup, we store no personal data about you, so these rights generally have no object. If you use one of these features, you can exercise your rights regarding the data processed there (see sections 4 and 5) at any time at <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>. You also have the right to lodge a complaint with a data protection supervisory authority."]
    ],
    imprintTitle:"Provider / Imprint",
    imprint:"Information pursuant to § 5 DDG (German Digital Services Act)<br><br><strong>Provider of the apps WomenCode &amp; MenCode</strong><br>Dennis Heidenreich<br>Josef-Martin-Weg 4<br>53501 Grafschaft, Germany<br>Email: <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a><br><br>Responsible for content: Dennis Heidenreich, address as above.",
    footer:"This policy applies to WomenCode and MenCode. · The German version is the legally binding one."
  },

    sections:[
      ["1","Responsable du traitement","Dennis Heidenreich<br>Josef-Martin-Weg 4<br>53501 Grafschaft, Allemagne<br>E-mail : <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>"],
      ["2","Principe : sans compte, sans pistage","Les applications fonctionnent sans compte utilisateur et sans inscription. Il n’y a <strong>aucune publicité, aucun pistage et aucun service d’analyse</strong>. Toutes les données de progression (points, niveaux, série, historique, réglages) sont stockées par défaut <strong>uniquement sur votre appareil</strong> et ne nous sont jamais transmises.<br><br>Les applications fonctionnent aussi entièrement hors ligne. Par défaut, la seule fonction en ligne est la consultation météo optionnelle, désactivable (voir point 6). Si vous activez en plus les fonctions tout aussi volontaires et désactivées par défaut CoupleCode (point 4) ou la sauvegarde de compte Google (point 5), des données sont transmises à Firebase (Google). Tant que vous n’utilisez pas ces fonctions, rien ne change : aucune connexion à Google, aucune transmission de données."],
      ["3","Autorisations des applications","<ul><li><strong>Notifications :</strong> pour les rappels quotidiens. Ils sont programmés localement sur l’appareil – sans serveur.</li><li><strong>Internet :</strong> utilisé pour la consultation météo optionnelle (point 6) et les liens de soutien volontaires (point 7), ainsi que – uniquement si vous les activez – pour CoupleCode (point 4) et la sauvegarde de compte (point 5).</li><li><strong>Fuseau horaire de l’appareil :</strong> lu localement pour afficher des missions adaptées à la saison et déterminer la localisation approximative pour la météo. Votre position précise (GPS) n’est <strong>jamais</strong> consultée.</li></ul>"],
      ["4","CoupleCode : connexion avec votre partenaire","CoupleCode est une fonction <strong>volontaire, désactivée par défaut</strong>, qui vous permet de relier votre application à celle de votre partenaire. Tant que vous n’activez pas CoupleCode, aucune connexion à Firebase n’est établie – aucune donnée n’est alors transmise à Google.<br><br>Même avec CoupleCode, il n’y a toujours <strong>ni compte utilisateur ni inscription</strong>. L’appairage se fait via un identifiant anonyme généré aléatoirement (Firebase Anonymous Authentication) – sans nom, adresse e-mail ni numéro de téléphone.<br><br><ul><li><strong>Sous-traitant :</strong> Google Ireland Limited (Firebase : Firestore, Authentication, Cloud Messaging). La base de données est hébergée dans l’UE (région eur3, Belgique et Pays-Bas). Un contrat de sous-traitance au sens de l’art. 28 RGPD existe via les conditions d’utilisation de Firebase.</li><li><strong>Base légale :</strong> votre consentement (art. 6, § 1, a RGPD), révocable à tout moment en vous déconnectant.</li><li><strong>Données transmises :</strong> les identifiants anonymes des deux appareils ; le score, le niveau et la série sous forme de chiffres ; le numéro de la mission de la veille tirée du catalogue de missions ainsi que son statut d’accomplissement – le texte de la mission lui-même n’est <strong>pas</strong> transmis, il reste stocké localement dans les deux applications ; des annotations telles qu’une contestation, une validation a posteriori et des rappels ; ainsi que le pseudonyme et la récompense souhaitée notée.</li><li><strong>Chiffrement de bout en bout :</strong> le pseudonyme et la récompense souhaitée sont chiffrés sur les appareils. La clé est négociée directement entre les deux appareils lors de la connexion (Diffie-Hellman) et n’est jamais transmise ni stockée – ni nous ni Google ne pouvons lire ce contenu. Le code d’invitation lui-même n’est jamais stocké ; seule son empreinte (hash) figure dans la base de données. Les invitations expirent après 72 heures.</li><li><strong>Notifications push :</strong> envoyées via Firebase Cloud Messaging lorsque votre partenaire vous envoie un rappel. Cela nécessite le traitement d’un jeton d’appareil ; la notification elle-même ne contient aucun contenu.</li><li><strong>Suppression :</strong> « Déconnecter » supprime immédiatement et intégralement les données partagées sur les deux appareils.</li></ul>"],
      ["5","Sauvegarde optionnelle via votre compte Google","Vous pouvez relier volontairement votre compte Google à l’application afin que votre progression survive à une réinstallation ou à un changement d’appareil. Cette fonction est désactivée par défaut.<br><br>Sans cette liaison, votre progression est définitivement perdue si vous supprimez l’application – c’est précisément l’objectif de cette fonction.<br><br>Lors de la liaison, votre adresse e-mail et l’identifiant de votre compte Google sont transmis à Firebase Authentication. Votre progression sauvegardée est stockée sous votre identifiant utilisateur dans Firestore (UE). La base légale est votre consentement (art. 6, § 1, a RGPD) ; vous pouvez annuler cette liaison à tout moment dans les réglages."],
      ["6","Consultation météo optionnelle (Open-Meteo)","Pour que les missions s’adaptent à la journée (p. ex. pas de mission en extérieur sous une pluie continue), les applications peuvent récupérer des données météo actuelles. Une requête est alors envoyée au service <strong>Open-Meteo</strong> (open-meteo.com). Techniquement, votre adresse IP et une localisation approximative dérivée du fuseau horaire de votre appareil (p. ex. « Berlin » pour Europe/Berlin) sont transmises – <strong>aucune coordonnée GPS, aucun profil de déplacement</strong>.<br><br>Open-Meteo est un service open source respectueux de la vie privée, sans compte ni pistage publicitaire. La base légale est notre intérêt légitime à une application fonctionnelle (art. 6, §1, f RGPD). Sans connexion Internet, l’application continue de fonctionner pleinement – les missions suivent alors seulement la date et la saison. Vous pouvez désactiver la météo à tout moment dans les réglages et vous opposer au traitement (art. 21 RGPD)."],
      ["7","Soutien volontaire (liens externes)","Dans les réglages, vous pouvez nous soutenir volontairement (p. ex. via « Buy Me a Coffee » ou PayPal). Ces liens s’ouvrent dans votre navigateur. Les règles de confidentialité du prestataire concerné ne s’appliquent qu’à ce moment-là – l’application elle-même ne transmet aucune donnée."],
      ["8","Magasins d’applications","Lors du téléchargement via Google Play ou l’App Store d’Apple, Google ou Apple traitent des données sous leur propre responsabilité (p. ex. statistiques d’installation anonymes par pays ou type d’appareil). Voir les politiques de confidentialité de Google et d’Apple."],
      ["9","Suppression de vos données","Vous gardez le contrôle total : « Réinitialiser la progression » dans les réglages supprime toutes les données de progression. Désinstaller l’application supprime définitivement toutes les données.<br><br>Si vous utilisez CoupleCode, « Déconnecter » met fin à l’appairage et supprime immédiatement et intégralement les données partagées sur les deux appareils (voir point 4). Si vous avez relié votre compte Google pour la sauvegarde (point 5), vous pouvez annuler cette liaison à tout moment dans les réglages.<br><br>Aucune donnée vous concernant ne se trouve toujours sur nos propres systèmes. Lorsque CoupleCode ou la sauvegarde de compte est active, Firebase (Google) traite pour notre compte les données mentionnées aux points 4 et 5."],
      ["10","Vos droits","Vous disposez des droits prévus aux art. 15 à 21 RGPD (accès, rectification, effacement, limitation, portabilité, opposition). Tant que vous n’utilisez pas CoupleCode ni la sauvegarde de compte, nous ne stockons aucune donnée personnelle vous concernant – ces droits sont alors généralement sans objet. Si vous utilisez l’une de ces fonctions, vous pouvez exercer vos droits concernant les données qui y sont traitées (voir points 4 et 5) à tout moment à <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>. Vous avez aussi le droit d’introduire une réclamation auprès d’une autorité de contrôle."]
    ],

  es: {
    htmlLang:"es",
    title:"Privacidad",
    sub:"WomenCode & MenCode",
    stand:"Última actualización: julio de 2026",
    facts:["Sin cuenta","Sin rastreo","Sin publicidad","Offline primero"],
    lead:"Esta política de privacidad se aplica a las apps <strong>WomenCode</strong> y <strong>MenCode</strong> («las apps»). Ambas funcionan bajo el mismo principio: sin cuenta de usuario, sin registro, sin rastreo. Por defecto, tus datos permanecen en tu dispositivo – solo si activas las funciones voluntarias CoupleCode o la copia de seguridad de cuenta se procesan además los datos descritos en los puntos 4 y 5.",
    sections:[
      ["1","Responsable","Dennis Heidenreich<br>Josef-Martin-Weg 4<br>53501 Grafschaft, Alemania<br>Correo: <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>"],
      ["2","Principio: sin cuenta, sin rastreo","Las apps funcionan sin cuenta de usuario y sin registro. No hay <strong>publicidad, ni rastreo, ni servicios de análisis</strong>. Todos los datos de progreso (puntos, niveles, racha, historial, ajustes) se guardan por defecto <strong>únicamente en tu dispositivo</strong> y nunca se nos transmiten.<br><br>Las apps también funcionan totalmente sin conexión. De forma predeterminada, la única función en línea es la consulta meteorológica opcional, que puede desactivarse (ver punto 6). Si además activas las funciones igualmente voluntarias y desactivadas por defecto CoupleCode (punto 4) o la copia de seguridad con Google (punto 5), se transmiten datos a Firebase (Google). Mientras no uses estas funciones, nada cambia: sin conexión con Google, sin transmisión de datos."],
      ["3","Permisos de las apps","<ul><li><strong>Notificaciones:</strong> para los recordatorios diarios. Se programan localmente en el dispositivo, sin servidor.</li><li><strong>Internet:</strong> se usa para la consulta meteorológica opcional (punto 6) y los enlaces de apoyo voluntario (punto 7), y – solo si las activas – para CoupleCode (punto 4) y la copia de seguridad de cuenta (punto 5).</li><li><strong>Zona horaria del dispositivo:</strong> se lee localmente para mostrar misiones acordes a la estación y determinar la ubicación aproximada para el tiempo. Nunca se accede a tu ubicación precisa (GPS).</li></ul>"],
      ["4","CoupleCode: conexión con tu pareja","CoupleCode es una función <strong>voluntaria y desactivada por defecto</strong> que te permite conectar tu app con la de tu pareja. Mientras no actives CoupleCode, no se establece ninguna conexión con Firebase – no se envía ningún dato a Google.<br><br>Incluso con CoupleCode activo, sigue sin haber <strong>cuenta de usuario ni registro</strong>. El emparejamiento funciona mediante un identificador anónimo generado aleatoriamente (Firebase Anonymous Authentication), sin nombre, correo electrónico ni número de teléfono.<br><br><ul><li><strong>Encargado del tratamiento:</strong> Google Ireland Limited (Firebase: Firestore, Authentication, Cloud Messaging). La base de datos se aloja en la UE (región eur3, Bélgica y Países Bajos). Existe un contrato de encargo de tratamiento conforme al art. 28 RGPD a través de las condiciones de uso de Firebase.</li><li><strong>Base jurídica:</strong> tu consentimiento (art. 6.1.a RGPD), revocable en cualquier momento desconectando.</li><li><strong>Datos transmitidos:</strong> los identificadores anónimos de ambos dispositivos; puntos, nivel y racha como números; el número de la misión de ayer del catálogo de misiones junto con su estado de finalización – el texto de la misión en sí <strong>no</strong> se transmite, permanece almacenado localmente en ambas apps; anotaciones como objeción, marcado posterior y recordatorios; así como el apodo y la recompensa deseada anotada.</li><li><strong>Cifrado de extremo a extremo:</strong> el apodo y la recompensa deseada se cifran en los dispositivos. La clave se negocia directamente entre ambos dispositivos al conectar (Diffie-Hellman) y nunca se transmite ni se almacena – ni nosotros ni Google podemos leer este contenido. El código de invitación en sí nunca se guarda; en la base de datos solo consta su valor hash. Las invitaciones caducan a las 72 horas.</li><li><strong>Notificaciones push:</strong> se envían mediante Firebase Cloud Messaging cuando tu pareja te envía un recordatorio. Para ello se procesa un token del dispositivo; la notificación en sí no contiene ningún contenido.</li><li><strong>Eliminación:</strong> «Desconectar» borra de inmediato y por completo el registro de datos compartido en ambos dispositivos.</li></ul>"],
      ["5","Copia de seguridad opcional mediante tu cuenta de Google","Puedes vincular voluntariamente tu cuenta de Google con la app para que tu progreso sobreviva a una reinstalación o a un cambio de dispositivo. Esta función está desactivada por defecto.<br><br>Sin esta vinculación, tu progreso se pierde de forma irreversible al eliminar la app – ese es precisamente el propósito de esta función.<br><br>Al vincularla se transmiten tu dirección de correo electrónico y el ID de tu cuenta de Google a Firebase Authentication. Tu progreso respaldado se guarda bajo tu identificador de usuario en Firestore (UE). La base jurídica es tu consentimiento (art. 6.1.a RGPD); puedes deshacer la vinculación en cualquier momento en los ajustes."],
      ["6","Consulta meteorológica opcional (Open-Meteo)","Para que las misiones encajen con el día (p. ej. ninguna misión al aire libre bajo lluvia continua), las apps pueden obtener datos meteorológicos actuales. Para ello se envía una solicitud al servicio <strong>Open-Meteo</strong> (open-meteo.com). Técnicamente se transmite tu dirección IP y una ubicación aproximada derivada de la zona horaria de tu dispositivo (p. ej. «Berlín» para Europe/Berlin) – <strong>sin coordenadas GPS ni perfil de movimiento</strong>.<br><br>Open-Meteo es un servicio de código abierto respetuoso con la privacidad, sin cuenta ni rastreo publicitario. La base jurídica es nuestro interés legítimo en una app funcional (art. 6.1.f RGPD). Sin conexión a Internet la app sigue funcionando por completo: las misiones se rigen entonces solo por la fecha y la estación. Puedes desactivar el tiempo cuando quieras en los ajustes y oponerte al tratamiento (art. 21 RGPD)."],
      ["7","Apoyo voluntario (enlaces externos)","En los ajustes puedes apoyarnos de forma voluntaria (p. ej. mediante «Buy Me a Coffee» o PayPal). Estos enlaces se abren en tu navegador. Solo allí rigen las condiciones de privacidad del proveedor correspondiente; la app en sí no transmite ningún dato."],
      ["8","Tiendas de aplicaciones","Al descargar la app en Google Play o la App Store de Apple, Google o Apple tratan datos bajo su propia responsabilidad (p. ej. estadísticas de instalación anónimas por país o tipo de dispositivo). Consulta las políticas de privacidad de Google y Apple."],
      ["9","Eliminación de tus datos","Tú tienes el control total: «Restablecer progreso» en los ajustes borra todos los datos de progreso. Desinstalar la app elimina todos los datos de forma definitiva.<br><br>Si usas CoupleCode, «Desconectar» finaliza el emparejamiento y borra de inmediato y por completo el registro de datos compartido en ambos dispositivos (ver punto 4). Si has vinculado tu cuenta de Google para la copia de seguridad (punto 5), puedes deshacer esa vinculación en cualquier momento en los ajustes.<br><br>En nuestros propios sistemas sigue sin haber ningún dato tuyo. Cuando CoupleCode o la copia de seguridad de cuenta están activas, Firebase (Google) trata por encargo nuestro los datos mencionados en los puntos 4 y 5."],
      ["10","Tus derechos","Tienes los derechos de los art. 15 a 21 RGPD (acceso, rectificación, supresión, limitación, portabilidad, oposición). Mientras no uses CoupleCode ni la copia de seguridad de cuenta, no almacenamos ningún dato personal tuyo, por lo que estos derechos por lo general no tienen objeto. Si usas alguna de estas funciones, puedes ejercer tus derechos respecto a los datos allí tratados (ver puntos 4 y 5) en cualquier momento escribiendo a <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>. También tienes derecho a reclamar ante una autoridad de control de protección de datos."]
    ],
    imprintTitle:"Titular / Aviso legal",
    imprint:"Información según el § 5 DDG (Ley alemana de servicios digitales)<br><br><strong>Titular de las apps WomenCode &amp; MenCode</strong><br>Dennis Heidenreich<br>Josef-Martin-Weg 4<br>53501 Grafschaft, Alemania<br>Correo: <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a><br><br>Responsable del contenido: Dennis Heidenreich, dirección arriba indicada.",
    footer:"Esta política se aplica a WomenCode y MenCode. · La versión alemana es la jurídicamente vinculante."
  },

  nl: {
    htmlLang:"nl",
    title:"Privacy",
    sub:"WomenCode & MenCode",
    stand:"Laatst bijgewerkt: juli 2026",
    facts:["Geen account","Geen tracking","Geen advertenties","Offline-first"],
    lead:"Deze privacyverklaring geldt voor de apps <strong>WomenCode</strong> en <strong>MenCode</strong> („de apps“). Beide werken volgens hetzelfde principe: zonder gebruikersaccount, zonder registratie, zonder tracking. Standaard blijven je gegevens op je toestel – alleen als je de vrijwillige functies CoupleCode of de accountback-up inschakelt, worden ook de in punt 4 en 5 beschreven gegevens verwerkt.",
    sections:[
      ["1","Verwerkingsverantwoordelijke","Dennis Heidenreich<br>Josef-Martin-Weg 4<br>53501 Grafschaft, Duitsland<br>E-mail: <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>"],
      ["2","Uitgangspunt: geen account, geen tracking","De apps werken zonder gebruikersaccount en zonder registratie. Er is <strong>geen reclame, geen tracking en geen analyse</strong>. Alle voortgangsgegevens (punten, niveaus, reeks, geschiedenis, instellingen) worden standaard <strong>uitsluitend lokaal op je toestel</strong> opgeslagen en nooit naar ons verzonden.<br><br>De apps werken ook volledig offline. Standaard is de enige online functie de optionele weersopvraag, die uitgeschakeld kan worden (zie punt 6). Als je daarnaast de eveneens vrijwillige en standaard uitgeschakelde functies CoupleCode (punt 4) of de back-up via Google (punt 5) inschakelt, worden gegevens naar Firebase (Google) verzonden. Zolang je deze functies niet gebruikt, verandert er niets: geen verbinding met Google, geen gegevensoverdracht."],
      ["3","App-machtigingen","<ul><li><strong>Meldingen:</strong> voor de dagelijkse herinneringen. Deze worden lokaal op het toestel gepland – zonder server.</li><li><strong>Internet:</strong> voor de optionele weersopvraag (punt 6) en de vrijwillige steunlinks (punt 7), en – alleen als je ze inschakelt – voor CoupleCode (punt 4) en de accountback-up (punt 5).</li><li><strong>Tijdzone van het toestel:</strong> wordt lokaal uitgelezen om seizoensgebonden missies te tonen en de globale locatie voor het weer te bepalen. Je precieze locatie (gps) wordt <strong>nooit</strong> geraadpleegd.</li></ul>"],
      ["4","CoupleCode: verbinding met je partner","CoupleCode is een <strong>vrijwillige, standaard uitgeschakelde</strong> functie waarmee je jouw app kunt koppelen aan de app van je partner. Zolang je CoupleCode niet inschakelt, wordt er geen verbinding met Firebase opgebouwd – er gaan dan geen gegevens naar Google.<br><br>Ook met CoupleCode blijft er <strong>geen gebruikersaccount en geen registratie</strong> nodig. De koppeling verloopt via een anonieme, willekeurig gegenereerde identificatie (Firebase Anonymous Authentication) – zonder naam, e-mailadres of telefoonnummer.<br><br><ul><li><strong>Verwerker:</strong> Google Ireland Limited (Firebase: Firestore, Authentication, Cloud Messaging). De database wordt gehost in de EU (regio eur3, België en Nederland). Er is een verwerkersovereenkomst conform art. 28 AVG via de gebruiksvoorwaarden van Firebase.</li><li><strong>Rechtsgrondslag:</strong> jouw toestemming (art. 6 lid 1 sub a AVG), die je op elk moment kunt intrekken door de verbinding te verbreken.</li><li><strong>Verzonden gegevens:</strong> de anonieme identificaties van beide toestellen; punten, niveau en reeks als getallen; het nummer van de missie van gisteren uit de missiecatalogus met de voltooiingsstatus – de missietekst zelf wordt <strong>niet</strong> verzonden, die staat lokaal in beide apps; notities zoals bezwaar, achteraf afvinken en herinneringen; en de bijnaam en genoteerde gewenste beloning.</li><li><strong>Eind-tot-eind-versleuteling:</strong> bijnaam en gewenste beloning worden op de toestellen versleuteld. De sleutel wordt bij het verbinden rechtstreeks tussen de twee toestellen uitonderhandeld (Diffie-Hellman) en nooit verzonden of opgeslagen – noch wij, noch Google kunnen deze inhoud lezen. De uitnodigingscode zelf wordt nooit opgeslagen; in de database staat alleen de hashwaarde. Uitnodigingen verlopen na 72 uur.</li><li><strong>Pushmeldingen:</strong> via Firebase Cloud Messaging, wanneer je partner je een herinnering stuurt. Daarvoor wordt een apparaattoken verwerkt; de melding zelf bevat geen inhoud.</li><li><strong>Verwijdering:</strong> „Verbinding verbreken“ verwijdert het gedeelde gegevensrecord onmiddellijk en volledig op beide toestellen.</li></ul>"],
      ["5","Optionele back-up via je Google-account","Je kunt vrijwillig je Google-account koppelen aan de app, zodat je voortgang een herinstallatie of toestelwissel overleeft. Deze functie staat standaard uit.<br><br>Zonder koppeling gaat je voortgang onherroepelijk verloren als je de app verwijdert – dat is precies het doel van deze functie.<br><br>Bij het koppelen worden je e-mailadres en je Google-account-ID doorgegeven aan Firebase Authentication. Je gebackupte voortgang staat onder je gebruikersidentificatie in Firestore (EU). Rechtsgrondslag is jouw toestemming (art. 6 lid 1 sub a AVG); je kunt de koppeling op elk moment weer ongedaan maken in de instellingen."],
      ["6","Optionele weersopvraag (Open-Meteo)","Zodat missies bij de dag passen (bijv. geen buitenmissie bij aanhoudende regen), kunnen de apps actuele weergegevens ophalen. Daarvoor wordt een verzoek naar de weerdienst <strong>Open-Meteo</strong> (open-meteo.com) gestuurd. Technisch worden daarbij je IP-adres en een globale locatie verzonden die uit de tijdzone van je toestel wordt afgeleid (bijv. „Berlijn“ bij Europe/Berlin) – <strong>geen gps-coördinaten, geen bewegingsprofiel</strong>.<br><br>Open-Meteo is een privacyvriendelijke open-sourcedienst zonder account en zonder advertentietracking. Rechtsgrondslag is ons gerechtvaardigd belang bij een werkende app (art. 6 lid 1 sub f AVG). Zonder internetverbinding blijft de app volledig werken – de missies volgen dan enkel de datum en het seizoen. Je kunt het weer op elk moment uitschakelen in de instellingen en bezwaar maken tegen de verwerking (art. 21 AVG)."],
      ["7","Vrijwillige steun (externe links)","In de instellingen kun je ons vrijwillig steunen (bijv. via „Buy Me a Coffee“ of PayPal). Deze links openen in je browser. Pas daar gelden de privacyvoorwaarden van de betreffende aanbieder – de app zelf verzendt geen gegevens."],
      ["8","App-stores","Bij het downloaden via Google Play of de Apple App Store verwerken Google resp. Apple gegevens onder eigen verantwoordelijkheid (bijv. anonieme installatiestatistieken per land of toesteltype). Details vind je in de privacyverklaringen van Google en Apple."],
      ["9","Verwijdering van je gegevens","Jij hebt volledige controle: „Voortgang resetten“ in de instellingen wist alle voortgangsgegevens. Door de app te verwijderen worden alle gegevens definitief gewist.<br><br>Gebruik je CoupleCode, dan beëindigt „Verbinding verbreken“ de koppeling en wist het onmiddellijk en volledig het gedeelde gegevensrecord op beide toestellen (zie punt 4). Heb je je Google-account gekoppeld voor de back-up (punt 5), dan kun je die koppeling op elk moment weer ongedaan maken in de instellingen.<br><br>Op onze eigen systemen staan nog steeds geen gegevens van jou. Bij actieve CoupleCode of actieve accountback-up verwerkt Firebase (Google) in onze opdracht de in punt 4 en 5 genoemde gegevens."],
      ["10","Jouw rechten","Je hebt de rechten uit art. 15–21 AVG (inzage, rectificatie, wissing, beperking, overdraagbaarheid, bezwaar). Zolang je CoupleCode en de accountback-up niet gebruikt, slaan wij geen persoonsgegevens van je op – deze rechten hebben dan doorgaans geen voorwerp. Gebruik je een van deze functies, dan kun je je rechten met betrekking tot de daar verwerkte gegevens (zie punt 4 en 5) altijd uitoefenen via <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a>. Je hebt bovendien het recht een klacht in te dienen bij een toezichthoudende autoriteit."]
    ],
    imprintTitle:"Aanbieder / Colofon",
    imprint:"Gegevens conform § 5 DDG (Duitse wet digitale diensten)<br><br><strong>Aanbieder van de apps WomenCode &amp; MenCode</strong><br>Dennis Heidenreich<br>Josef-Martin-Weg 4<br>53501 Grafschaft, Duitsland<br>E-mail: <a href='mailto:kontakt@praesenzwert.de'>kontakt@praesenzwert.de</a><br><br>Verantwoordelijk voor de inhoud: Dennis Heidenreich, adres als boven.",
    footer:"Deze verklaring geldt voor WomenCode en MenCode. · De Duitse versie is juridisch bindend."
  }
};

const LANGS = ["de","en","fr","es","nl"];

function render(lang){
  const d = T[lang];
  document.documentElement.lang = d.htmlLang;
  document.getElementById("pageTitle").textContent = d.title;
  document.getElementById("pageSub").innerHTML = d.sub;
  document.getElementById("standLine").textContent = d.stand;
  document.title = d.title + " – WomenCode & MenCode";

  document.getElementById("facts").innerHTML =
    d.facts.map(f=>`<span class="pill">${f}</span>`).join("");

  let html = `<div class="lead">${d.lead}</div>`;
  d.sections.forEach(s=>{
    html += `<section class="doc"><h2><span class="num">${s[0]}</span>${s[1]}</h2><p>${s[2]}</p></section>`;
  });
  html += `<hr class="sep"><section class="doc imprint"><h2>${d.imprintTitle}</h2><address>${d.imprint}</address></section>`;
  document.getElementById("content").innerHTML = html;

  document.getElementById("footer").innerHTML =
    `${d.footer}<br><a href="/">praesenzwert.de</a>`;

  document.querySelectorAll(".langbar button").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang===lang);
  });

  try{ localStorage.setItem("codeDatenschutzLang", lang); }catch(e){}
  const url = new URL(window.location);
  url.searchParams.set("lang", lang);
  history.replaceState(null,"",url);
}

function pickInitial(){
  const p = new URLSearchParams(location.search).get("lang");
  if(p && LANGS.includes(p)) return p;
  let stored=null; try{ stored=localStorage.getItem("codeDatenschutzLang"); }catch(e){}
  if(stored && LANGS.includes(stored)) return stored;
  const nav=(navigator.language||"de").slice(0,2).toLowerCase();
  return LANGS.includes(nav)?nav:"de";
}

document.querySelectorAll(".langbar button").forEach(b=>{
  b.addEventListener("click",()=>render(b.dataset.lang));
});
render(pickInitial());
</script>
</body>
</html>
